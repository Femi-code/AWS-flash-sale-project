AWSTemplateFormatVersion: '2010-09-09'
Description: 'Flash Sale Project - Phase 2: Auto-Scaling Web Servers and Load Balancer'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

Resources:
  # 1. The Load Balancer's Firewall (Allows anyone on the internet)
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the internet
      VpcId: !ImportValue FlashSale-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # 2. The Web Servers' Firewall (ONLY allows traffic from the Load Balancer)
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic ONLY from the ALB
      VpcId: !ImportValue FlashSale-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp        
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # 8. The Scaling Policy (The Brain)
  FlashSaleScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref FlashSaleASG
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 50.0  # Keep CPU at 50%. If it hits 100%, AWS will PANIC.

  # 3. The Application Load Balancer (The Traffic Cop)
  FlashSaleALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: FlashSale-ALB
      Subnets:
        - !ImportValue FlashSale-PublicSubnet1
        - !ImportValue FlashSale-PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  # 4. Target Group (Where the ALB sends the traffic)
  FlashSaleTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue FlashSale-VpcId
      Port: 80
      Protocol: HTTP
      Matcher:
        HttpCode: '200'

  # 5. The ALB Listener (Listens on port 80 and forwards to Target Group)
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref FlashSaleALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FlashSaleTargetGroup

  # 6. The Server Blueprint (Launch Template)
  FlashSaleLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !Ref WebServerSecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # Standard Web Server Installation for Amazon Linux 2 & 2023
            yum update -y
            yum install -y httpd
            
            # Start and enable the web server
            systemctl start httpd
            systemctl enable httpd
            
            # Create the landing page
            echo "<h1>Welcome to the Ultimate Flash Sale!</h1><p>Server ID: $(hostname)</p>" > /var/www/html/index.html

  # 7. The Auto Scaling Group (The Engine)
  FlashSaleASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !ImportValue FlashSale-PublicSubnet1
        - !ImportValue FlashSale-PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref FlashSaleLaunchTemplate
        Version: !GetAtt FlashSaleLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '1'
      HealthCheckType: ELB           # Tells ASG to listen to the Load Balancer's opinion
      HealthCheckGracePeriod: 300    # Wait 5 minutes before marking a server as failed
      TargetGroupARNs:
        - !Ref FlashSaleTargetGroup

Outputs:
  WebsiteURL:
    Description: The public URL of the Flash Sale Load Balancer
    Value: !GetAtt FlashSaleALB.DNSName